<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>richard ralphael</title>
    <meta name="description" content="Immersive 3D portfolio showcasing cutting-edge web development, interactive experiences, and modern technology solutions. Specializing in React, Three.js, and WebGL." />
    <meta name="author" content="Creative Developer" />
    <meta name="keywords" content="3D portfolio, web developer, Three.js, React, WebGL, interactive design, creative developer, modern web development" />

    <meta property="og:title" content="richard ralphael" />
    <meta property="og:description" content="Immersive 3D portfolio showcasing cutting-edge web development, interactive experiences, and modern technology solutions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./pfp.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Creative Developer | 3D Portfolio" />
    <meta name="twitter:description" content="Immersive 3D portfolio showcasing cutting-edge web development and interactive experiences." />
    <meta name="twitter:image" content="./pfp.png" />
    
    <link rel="canonical" href="/" />
    <meta name="theme-color" content="#00ffff" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 800px;
        position: relative;
        z-index: 1;
      }
      
      .glow {
        background: radial-gradient(circle, rgba(0,255,255,0.3) 0%, transparent 70%);
        border-radius: 50%;
        width: 300px;
        height: 300px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: pulse 3s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
      }
      
      .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        margin: 0 auto 2rem;
        border: 3px solid #00ffff;
        box-shadow: 0 0 30px rgba(0,255,255,0.5);
        object-fit: cover;
      }
      
      h1 {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 1rem;
        background: linear-gradient(45deg, #00ffff, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(0,255,255,0.5);
      }
      
      .tagline {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        opacity: 0.9;
        color: #b0b0b0;
      }
      
      .skills {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 2rem;
      }
      
      .skill {
        background: rgba(0,255,255,0.1);
        border: 1px solid #00ffff;
        padding: 0.5rem 1rem;
        border-radius: 25px;
        font-size: 0.9rem;
        transition: all 0.3s ease;
      }
      
      .skill:hover {
        background: rgba(0,255,255,0.2);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,255,255,0.3);
      }
      
      .contact {
        margin-top: 2rem;
      }
      
      .contact a {
        color: #00ffff;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      
      .contact a:hover {
        color: #ff00ff;
        text-shadow: 0 0 10px rgba(255,0,255,0.5);
      }
      
      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }
      
      .particle {
        position: absolute;
        background: #00ffff;
        border-radius: 50%;
        opacity: 0.3;
        animation: float 6s infinite ease-in-out;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(180deg); }
      }
    </style>
  </head>
  <body>
    <div class="particles" id="particles"></div>
    <div class="glow"></div>
    
    <div class="container">
      <img src="./pfp.png" alt="Richard Ralphael" class="profile-img">
      
      <h1>Richard Ralphael</h1>
      <p class="tagline">Creative Developer & Digital Artist</p>
      
      <div class="skills">
        <span class="skill">React</span>
        <span class="skill">Three.js</span>
        <span class="skill">WebGL</span>
        <span class="skill">TypeScript</span>
        <span class="skill">Node.js</span>
        <span class="skill">Web Development</span>
        <span class="skill">3D Design</span>
        <span class="skill">Interactive Experiences</span>
      </div>
      
      <div class="contact">
        <p>Creating immersive digital experiences that blend art and technology</p>
        <p style="margin-top: 1rem;">
          <a href="mailto:contact@example.com">Get in touch</a>
        </p>
      </div>
    </div>
    
    <script>
      // Create floating particles
      const particlesContainer = document.getElementById('particles');
      const particleCount = 50;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 4 + 1 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
        particlesContainer.appendChild(particle);
      }
      
      // Add mouse interaction
      document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        
        document.querySelector('.glow').style.transform = 
          `translate(${x * 20 - 10}px, ${y * 20 - 10}px)`;
      });
    </script>
  </body>
</html>
